---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: nr-nginx
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        server {
            listen 80;
            server_name localhost;

            location / {
                root /usr/share/nginx/html;
                index index.html;
            }

            # Enable stub_status for metrics collection
            location /stub_status {
                stub_status on;
                access_log off;
            }
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: nr-nginx
  labels:
    app: nginx
spec:
  ports:
    - port: 80
      name: http
      protocol: TCP
    - port: 8080
      name: stub-status
      protocol: TCP
      targetPort: 80
  selector:
    app: nginx
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  namespace: nr-nginx
  labels:
    app: nginx
spec:
  containers:
    - name: nginx
      image: nginx:1.25-alpine
      ports:
        - containerPort: 80
          name: http
          protocol: TCP
      volumeMounts:
        - name: nginx-config-vol
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
  volumes:
    - name: nginx-config-vol
      configMap:
        name: nginx-config

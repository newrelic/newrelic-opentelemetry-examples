---
apiVersion: v1
kind: Namespace
metadata:
  name: nr-nginx
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config
  namespace: nr-nginx
  labels:
    app.kubernetes.io/name: collector-config
data:
  collector-config: |
    receivers:
      nginx:
        # Connect to nginx pod stub_status endpoint defined in nginx.yaml using service env vars set by k8s
        endpoint: http://${NGINX_SERVICE_SERVICE_HOST}:${NGINX_SERVICE_SERVICE_PORT}/stub_status
        collection_interval: 10s
        # Enable all available metrics (default is true for all)
        metrics:
          nginx.requests:
            enabled: true
          nginx.connections_accepted:
            enabled: true
          nginx.connections_handled:
            enabled: true
          nginx.connections_current:
            enabled: true

    processors:
      batch:
        send_batch_size: 1024
        timeout: 30s
      # Add cluster name as resource attribute
      resource/cluster:
        attributes:
          - key: k8s.cluster.name
            value: "${env:K8S_CLUSTER_NAME}"
            action: insert
      # Transform processor to add nginx-specific attributes
      transform/nginx:
        metric_statements:
          - context: resource
            statements:
              - set(attributes["nginx.display.name"], Concat(["nginx", ":", attributes["server.address"], ":", attributes["server.port"]], ""))
              - set(attributes["nginx.deployment.name"], attributes["server.address"])
      # Add identifying resource attributes, which is required for New Relic entity synthesis.
      # The nginx receiver does not currently include any identifying attributes on the metrics it produces.
      # We manually assign values to server.address and server.port, since values for ${NGINX_SERVICE_SERVICE_HOST} and ${NGINX_SERVICE_SERVICE_PORT} are unstable.
      attributes/nginx_metrics:
        include:
          match_type: regexp
          metric_names:
            # Notice that if with single or without quotes just one backslash is needed 'nginx\..*'
            - "nginx\\..*"
        actions:
          - action: upsert
            key: server.address
            value: "nginx"
          - action: upsert
            key: server.port
            value: "80"
      # Remove metric metadata to reduce cardinality
      transform/metadata_nullify:
        metric_statements:
          - context: metric
            statements:
              - set(description, "")
              - set(unit, "")

    exporters:
      otlphttp:
        endpoint: ${NEW_RELIC_OTLP_ENDPOINT}
        headers:
          api-key: ${NEW_RELIC_API_KEY}

    service:
      pipelines:
        metrics:
          receivers: [nginx]
          processors: [batch, resource/cluster, transform/nginx, attributes/nginx_metrics, transform/metadata_nullify]
          exporters: [otlphttp]
---
apiVersion: v1
kind: Pod
metadata:
  name: collector
  namespace: nr-nginx
  labels:
    app.kubernetes.io/name: collector
spec:
  containers:
    - name: collector
      image: otel/opentelemetry-collector-contrib:0.146.1
      # For production, consider adding:
      # resources:
      #   requests:
      #     memory: "128Mi"
      #     cpu: "100m"
      #   limits:
      #     memory: "512Mi"
      #     cpu: "500m"
      env:
        # The default US endpoint is set here. You can change the endpoint and port based on your requirements if needed.
        # docs: https://docs.newrelic.com/docs/more-integrations/open-source-telemetry-integrations/opentelemetry/best-practices/opentelemetry-otlp/#configure-endpoint-port-protocol
        - name: NEW_RELIC_OTLP_ENDPOINT
          value: https://otlp.nr-data.net/
        # The New Relic API key used to authenticate export requests.
        # Defined in secrets.yaml
        - name: NEW_RELIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: nr-nginx-secret
              key: NEW_RELIC_API_KEY
        # Kubernetes cluster name for resource identification
        - name: K8S_CLUSTER_NAME
          value: nginx-cluster
      volumeMounts:
        - name: collector-config-vol
          mountPath: /etc/otelcol-contrib
  volumes:
    - name: collector-config-vol
      configMap:
        name: collector-config
        items:
          - key: collector-config
            path: config.yaml

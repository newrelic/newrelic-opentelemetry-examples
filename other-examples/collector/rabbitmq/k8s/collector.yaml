---
apiVersion: v1
kind: Namespace
metadata:
  name: nr-rabbitmq
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config
  namespace: nr-rabbitmq
  labels:
    app.kubernetes.io/name: collector-config
data:
  collector-config: |
    receivers:
      rabbitmq:
        # Connect to rabbitmq pod management API defined in rabbitmq.yaml using service env vars set by k8s
        endpoint: http://${RABBITMQ_SERVICE_SERVICE_HOST}:15672
        username: guest
        password: guest
        collection_interval: 10s

    processors:
      batch:
      # Add identifying resource attributes, which is required for New Relic entity synthesis.
      # The rabbitmq receiver does not currently include any identifying attributes on the metrics it produces.
      # We manually assign values to server.address and server.port, since values for ${RABBITMQ_SERVICE_SERVICE_HOST} and ${RABBITMQ_SERVICE_SERVICE_PORT} are unstable.
      attributes/rabbitmq_metrics:
        include:
          match_type: regexp
          metric_names:
            # Notice that if with single or without quotes just one backslash is needed 'rabbitmq\..*'
            - "rabbitmq\\..*"
        actions:
          - action: upsert
            key: server.address
            value: "rabbitmq"
          - action: upsert
            key: server.port
            value: "5672"

    exporters:
      otlphttp:
        endpoint: ${NEW_RELIC_OTLP_ENDPOINT}
        headers:
          api-key: ${NEW_RELIC_API_KEY}

    service:
      pipelines:
        metrics:
          receivers: [rabbitmq]
          processors: [attributes/rabbitmq_metrics, batch]
          exporters: [otlphttp]
---
apiVersion: v1
kind: Pod
metadata:
  name: collector
  namespace: nr-rabbitmq
  labels:
    app.kubernetes.io/name: collector
spec:
  containers:
    - name: collector
      image: otel/opentelemetry-collector-contrib:0.98.0
      env:
        # The default US endpoint is set here. You can change the endpoint and port based on your requirements if needed.
        # docs: https://docs.newrelic.com/docs/more-integrations/open-source-telemetry-integrations/opentelemetry/best-practices/opentelemetry-otlp/#configure-endpoint-port-protocol
        - name: NEW_RELIC_OTLP_ENDPOINT
          value: https://otlp.nr-data.net/
        # The New Relic API key used to authenticate export requests.
        # Defined in secrets.yaml
        - name: NEW_RELIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: nr-rabbitmq-secret
              key: NEW_RELIC_API_KEY
      volumeMounts:
        - name: collector-config-vol
          mountPath: /etc/otelcol-contrib
  volumes:
    - name: collector-config-vol
      configMap:
        name: collector-config
        items:
          - key: collector-config
            path: config.yaml

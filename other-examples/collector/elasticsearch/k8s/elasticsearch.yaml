---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-service
  namespace: nr-elasticsearch
  labels:
    app: elasticsearch
spec:
  ports:
    - port: 9200
      name: http
      protocol: TCP
  selector:
    app: elasticsearch
---
apiVersion: v1
kind: Pod
metadata:
  name: elasticsearch
  namespace: nr-elasticsearch
  labels:
    app: elasticsearch
spec:
  containers:
    - name: elasticsearch
      image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
      env:
        - name: discovery.type
          value: "single-node"
        - name: xpack.security.enabled
          value: "false"
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
      ports:
        - containerPort: 9200
          name: http
          protocol: TCP

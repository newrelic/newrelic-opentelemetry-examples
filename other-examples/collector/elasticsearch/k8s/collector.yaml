---
apiVersion: v1
kind: Namespace
metadata:
  name: nr-elasticsearch
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config
  namespace: nr-elasticsearch
  labels:
    app.kubernetes.io/name: collector-config
data:
  collector-config: |
    receivers:
      elasticsearch:
        # Connect to elasticsearch pod defined in elasticsearch.yaml using service env vars set by k8s
        endpoint: http://${ELASTICSEARCH_SERVICE_SERVICE_HOST}:${ELASTICSEARCH_SERVICE_SERVICE_PORT}
        # Skip TLS verification for demo purposes
        skip_verify: true
        collection_interval: 30s
        metrics:
          # Cluster health and status metrics
          elasticsearch.cluster.health:
            enabled: true
          elasticsearch.cluster.data_nodes:
            enabled: true
          elasticsearch.cluster.nodes:
            enabled: true
          elasticsearch.cluster.shards:
            enabled: true

          # Node performance metrics
          elasticsearch.node.cache.memory.usage:
            enabled: true
          elasticsearch.node.fs.disk.available:
            enabled: true
          elasticsearch.node.fs.disk.total:
            enabled: true
          elasticsearch.node.operations.completed:
            enabled: true
          elasticsearch.node.operations.time:
            enabled: true
          elasticsearch.node.http.connections:
            enabled: true

          # JVM metrics
          jvm.memory.heap.used:
            enabled: true
          jvm.memory.heap.max:
            enabled: true
          jvm.memory.heap.utilization:
            enabled: true
          jvm.gc.collections.count:
            enabled: true
          jvm.gc.collections.elapsed:
            enabled: true
          jvm.threads.count:
            enabled: true

          # Index metrics
          elasticsearch.index.operations.completed:
            enabled: true
          elasticsearch.index.operations.time:
            enabled: true
          elasticsearch.index.documents:
            enabled: true

    processors:
      batch:
        send_batch_size: 1024
        timeout: 30s

      resource/cluster_name_override:
        attributes:
          - key: elasticsearch.cluster.name
            value: "elasticsearch-cluster"  # Replace with your cluster name
            action: upsert

    exporters:
      otlphttp:
        endpoint: ${NEW_RELIC_OTLP_ENDPOINT}
        headers:
          api-key: ${NEW_RELIC_API_KEY}

    service:
      pipelines:
        metrics:
          receivers: [elasticsearch]
          processors: [resource/cluster_name_override, batch]
          exporters: [otlphttp]
---
apiVersion: v1
kind: Pod
metadata:
  name: collector
  namespace: nr-elasticsearch
  labels:
    app.kubernetes.io/name: collector
spec:
  containers:
    - name: collector
      image: otel/opentelemetry-collector-contrib:0.146.1
      # For production, consider adding:
      # resources:
      #   requests:
      #     memory: "128Mi"
      #     cpu: "100m"
      #   limits:
      #     memory: "512Mi"
      #     cpu: "500m"
      env:
        # The default US endpoint is set here. You can change the endpoint and port based on your requirements if needed.
        # docs: https://docs.newrelic.com/docs/more-integrations/open-source-telemetry-integrations/opentelemetry/best-practices/opentelemetry-otlp/#configure-endpoint-port-protocol
        - name: NEW_RELIC_OTLP_ENDPOINT
          value: https://otlp.nr-data.net/
        # The New Relic API key used to authenticate export requests.
        # Defined in secrets.yaml
        - name: NEW_RELIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: nr-elasticsearch-secret
              key: NEW_RELIC_API_KEY
      volumeMounts:
        - name: collector-config-vol
          mountPath: /etc/otelcol-contrib
  volumes:
    - name: collector-config-vol
      configMap:
        name: collector-config
        items:
          - key: collector-config
            path: config.yaml

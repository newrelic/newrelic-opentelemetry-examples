---
apiVersion: v1
kind: Namespace
metadata:
  name: nr-elasticsearch
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config
  namespace: nr-elasticsearch
  labels:
    app.kubernetes.io/name: collector-config
data:
  collector-config: |
    receivers:
      elasticsearch:
        # Connect to elasticsearch pod defined in elasticsearch.yaml using service env vars set by k8s
        endpoint: http://${ELASTICSEARCH_SERVICE_SERVICE_HOST}:${ELASTICSEARCH_SERVICE_SERVICE_PORT}
        # Skip TLS verification for demo purposes
        skip_verify: true
        metrics:
          # Enable additional optional metrics
          elasticsearch.node.cache.memory.usage:
            enabled: true
          elasticsearch.node.fs.disk.available:
            enabled: true

    processors:
      batch:
      # Add identifying resource attributes, which is required for New Relic entity synthesis.
      # The elasticsearch receiver does not currently include any identifying attributes on the metrics it produces.
      # We manually assign values to server.address and server.port, since values for ${ELASTICSEARCH_SERVICE_SERVICE_HOST} and ${ELASTICSEARCH_SERVICE_SERVICE_PORT} are unstable.
      attributes/elasticsearch_metrics:
        include:
          match_type: regexp
          metric_names:
            # Notice that if with single or without quotes just one backslash is needed 'elasticsearch\..*'
            - "elasticsearch\\..*"
        actions:
          - action: upsert
            key: server.address
            value: "elasticsearch"
          - action: upsert
            key: server.port
            value: "9200"

    exporters:
      otlphttp:
        endpoint: ${NEW_RELIC_OTLP_ENDPOINT}
        headers:
          api-key: ${NEW_RELIC_API_KEY}

    service:
      pipelines:
        metrics:
          receivers: [elasticsearch]
          processors: [attributes/elasticsearch_metrics, batch]
          exporters: [otlphttp]
---
apiVersion: v1
kind: Pod
metadata:
  name: collector
  namespace: nr-elasticsearch
  labels:
    app.kubernetes.io/name: collector
spec:
  containers:
    - name: collector
      image: otel/opentelemetry-collector-contrib:0.146.1
      # For production, consider adding:
      # resources:
      #   requests:
      #     memory: "128Mi"
      #     cpu: "100m"
      #   limits:
      #     memory: "512Mi"
      #     cpu: "500m"
      env:
        # The default US endpoint is set here. You can change the endpoint and port based on your requirements if needed.
        # docs: https://docs.newrelic.com/docs/more-integrations/open-source-telemetry-integrations/opentelemetry/best-practices/opentelemetry-otlp/#configure-endpoint-port-protocol
        - name: NEW_RELIC_OTLP_ENDPOINT
          value: https://otlp.nr-data.net/
        # The New Relic API key used to authenticate export requests.
        # Defined in secrets.yaml
        - name: NEW_RELIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: nr-elasticsearch-secret
              key: NEW_RELIC_API_KEY
      volumeMounts:
        - name: collector-config-vol
          mountPath: /etc/otelcol-contrib
  volumes:
    - name: collector-config-vol
      configMap:
        name: collector-config
        items:
          - key: collector-config
            path: config.yaml

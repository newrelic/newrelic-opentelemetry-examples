services:
  autogen-otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: autogen-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./autogen-otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "55679:55679" # ZPages extension
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - autogen-otel-network

networks:
  autogen-otel-network:
    driver: bridge
